<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Fan-made Survivor.io optimizer calculator hub." />
  <title>Survivor.io Optimizer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="logo">S</span>
        <div>
          <strong>Survivor.io Optimizer</strong>
          <small>fan-made account tools</small>
        </div>
      </div>
      <div class="top-actions">
        <button id="sampleBtn" class="btn ghost" type="button">Load sample</button>
        <button id="copyBtn" class="btn" type="button">Copy results</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="search-wrap">
          <input id="search" type="search" placeholder="Search tools..." autocomplete="off" />
        </div>
        <div id="groups" class="groups"></div>
      </aside>

      <main class="workspace">
        <section class="tool-head">
          <div>
            <p id="toolCategory" class="kicker">Core</p>
            <h1 id="toolTitle">Global Upgrade Plan</h1>
            <p id="toolDescription">Rank the next best account move across systems.</p>
          </div>
          <span id="toolStatus" class="status">working draft</span>
        </section>

        <section class="work-grid">
          <form id="toolForm" class="panel form-panel"></form>
          <aside class="panel result-panel">
            <div class="panel-title">
              <h2>Result</h2>
              <span id="scoreBadge">—</span>
            </div>
            <div id="resultBox" class="result-box"></div>
          </aside>
        </section>

        <section class="panel notes-panel">
          <h2>Notes / build logic</h2>
          <div id="notesBox"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
